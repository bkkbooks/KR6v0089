body:
  text: 二曜金剛合璧整理者通源題解二曜金剛合璧民間流傳的反映日曜崇拜與月曜崇拜的文獻作者不詳一卷該文獻包括佛說日光經佛說太陽經佛說月光經佛說太陰經金剛般若波羅蜜經纂等五種經典合刊為一冊書中有出經記云是經降於同治六年二月朔有雲陽之楊尚一得之古剎灰塵中一見忻然便捐資重刊並將金剛經翻刻於後合為一卷云會極山人張君一校刻鳳嶺樵夫張大勳恭錄由此可知該冊的主體部分佛說日光經佛說太陽經佛說月光經佛說太陰經等文獻產生於清代原本應為乩書其後雲陽楊尚一將上述關於日曜月曜崇拜的四種文獻與久已流傳於民間的金剛經纂合併刊刻故稱二曜金剛合璧日曜崇拜與月曜崇拜本是民間的信仰形態在我國有著悠久的歷史傳統清代儒釋道三教合一已經成為中國民間思潮的主流在三教合一思潮的籠罩下二曜崇拜也呈現新的形態加之明清兩代乩書特盛乩書與民間的種種信仰形態相互影響對民間宗教的產生與發展予以較大的刺激這就是本文獻在內容上表現為民間信仰與儒釋道三教合一思想相結合而在形式上表現為乩書的原因宋以後我國佛教中的信仰性成份日益加重迨至明清呈現出種種与前不同的形態而二曜金剛合璧為我們研究清代佛教提供了不可多得的資料同冊之金剛經纂最早見於敦煌遺書藏外佛教文獻第一輯已經整理發表但本冊所收金剛經纂與第一輯已經整理發表者文字有異同應為該文獻的後期流傳形態已形成異本故再次錄文以供研究整理者所見之二曜金剛合璧為清宣統元年刻本封面正中有二曜金剛合璧大字一行上首為小字宣統元年重鎸下首為小字天竺庵藏版由私人收藏此處根據原書錄文無校本錄文佛說日光經志心皈命禮赤陽炎帝東極扶桑洪濛剖而天地初分陰陽垂象兩儀並而三才定位宇宙開明發普天之和氣金烏散彩而照耀乾坤掩眾星之光芒玉衡璇璣而運行晝夜按遲留伏逆之遷移回凶作吉轉否去泰來之氣運改禍成祥化育普天陶鎔品彚恩覃率土萬物回春星應帝都為天左目大悲大願大聖大慈日宮炎光太陽帝君日宮皇極天尊南無日光菩薩向東來天地日月九重開十萬八千諸寶塔菩薩盡在兩邊排腳踏烏雲裏青蓮遍地開頭頂無量寶塔眼觀娑婆世界耳聽諸佛說法身披金龍袈裟若有善男子善女人唸得日光經一卷準得金剛經十卷每日清晨唸一卷生死不墮地獄門一來報答天和地二來報答父母恩天羅神地羅神人離難難離身一切災難化為塵南無日光菩薩摩訶薩佛說太陽經太陽經太陽經太陽出現滿天明曉夜行來不住停行得快來催人老行得遲來不留存家家門前都走到眾生糊塗叫小名惱了太陽歸山去餓死黎民苦眾生天上少我無晝夜地下少我無收成位位神聖有人敬那個敬我太陽君太陽冬月十九生家家唸佛點明燈有人傳我太陽經闔家大小免災星無人傳我太陽經眼前就是地獄門南無統世諸光佛傳與善男信女聽每日清晨唸七遍永世不進地獄門一門男女增福壽七代祖宗早超昇所求事事皆遂意千祥雲集福駢臻南無統世諸光佛收經偈太陽天子大威神天上人間現一輪冷暖溫和皆氣候不分冬夏自調勻佛說月光經志心皈命禮金華素曜西極廣寒太極判而陰陽始分開明晝夜五行列而八卦定位數合周天陽長陰消玉兔煉長生之藥東升西墜金蟾含吐納之功透川澤之靈明映虛室而生白聚山河之秀氣瑩皎潔以騰輝一輪圓滿徹有礙以皆通萬壑流輝遍無幽而不燭仁敷率土九夜沾恩惠發普天群生荷澤星應阿房為天右目大悲大願大聖大慈月府素曜太陰星君月宮正一天尊佛說太陰經混沌初開即有我我是天上月光神兩儀自判分日月日掌陽來我掌陰陰陽配合從孝順孝順如來掌乾坤上掌三十三天界下照十八地獄門家家戶戶都走到那個山林不去行五湖四海皆照耀萬國九州盡游尋一更一點初出土滿天星斗讓光明行人坐客欣賞玩無個敬我太陰神二更二點睡沉沉我在天上正奔騰晝夜轉旋無敢慢時刻周流未差分三更三點冷冰冰嚴霜繁露透衣襟風寒雨急都不避一心祗念我身靈四更四點向西行二十八宿更精瑩大千世界誰憐憫形隻影單走輕雲五更五點天又明扶桑樹杪日光臨太陽出現我纔轉一夜千勞萬苦辛祗有諸佛有人敬那個敬我太陰神世間草木皆賴我五穀非我不生成不是我生甘露水獨陽不長古今聞太陰正月初六生善男信女要心誠一柱清香一盞燈消災免難福自申若人不敬月光神瘟疫疾病降臨身善男敬我月光神金榜題名做貴人善女敬我月光神紅蓮岩上聽經文官宦敬我月光神位祿名壽得高陞世人敬我月光神福祿綿綿蔭子孫五十二句真妙經一十二月記在心善男信女念數遍千祥雲集百福臻志心常念普光經普光菩薩月光經月光菩薩普光經手掌素珠口念經上方下方念一遍直到西方佛惠生有人念得月光經猶如庫內積黃金積得黃金拿不去臨行記得兩卷經遮我身護我形災離難難離身一切災殃化為塵上搭金橋金寶殿一朵蓮花火內生字多不過二十五準得華嚴一藏經南無月光菩薩摩訶薩收經偈願以此真經普及於一切誦經保平安消災增福壽鄧真人讚曰至哉陰陽二星君普照川澤不徇情東昇西墜無敢慢三曹賴此以香馨為爾塵世忤逆輩罔知報恩反賤輕濁氣直衝宮府內薄蝕日月大劫臨二曜星君經終奉請八大金剛奉請青除災金剛奉請辟毒金剛奉請黃隨求金剛奉請白淨水金剛奉請赤聲火金剛奉請定除災金剛奉請紫賢金剛奉請大神金剛奉請四菩薩奉請金剛眷菩薩奉請金剛索菩薩奉請金剛愛菩薩奉請金剛語菩薩金剛般若波羅蜜經纂如是我聞善男子善女人受持讀誦此經纂一卷如轉金剛經三十萬卷又得神明加護眾聖提擕國建大曆七年毗山縣令劉氏女子年一十九歲得病身亡至五七日引見閻羅天子問曰一生以來作何功德利益女子答曰自從七歲以來常受持金剛般若波羅蜜經至今不闕天子再問曰何不念金剛經纂女子答曰緣世上無本天子言曰善哉善哉特放汝還陽活壽命百歲諦聽吾言分明記取歸還陽間於濠州鍾離寺石碑上仔細抄錄精勤持念得無量福報無邊功德壽命延長若勸人書寫讀誦流布遐邇功莫大焉此是天子囑言遂令女子再却還魂使往濠州鍾離寺尋覓果見一石碑上分明從如是我聞至信受奉行都計五千八百二十四字六十九生七十九佛八十三相五十三世尊八十八如來二十三金剛四十菩薩一百三十八須菩提一十三善男子善女人三十八何以故四十二心字四十六眾生六個所以者何三十於意云何七個四句偈等三十一不二十六此二十七字可二十阿耨多羅三藐三菩提二十一當二十一布施一十八福德一十一微塵七個恒河沙七個三千大千世界八個三十二相九功德九莊嚴十個受持讀誦八個白佛言世尊七個若復有人二是樂阿蘭那行二釋迦牟尼二摩訶薩二句如來不應以具足色身見三個其福勝彼三句為他人說三個所得功德一十三波羅密四成就三個於此經中四燃燈佛所四為他人說四降伏其身四如是四須陀洹四斯陀含四阿那含八阿羅漢此是四果四向仙人昔為歌利王割截身體如我往昔節節支解時若有我相人相眾生相壽者相二無我見人見眾生見壽者見三比丘尼數內七十一者七十三以此經纂按大藏寶積經內錄出若有人看一卷如轉金剛經三十萬卷摩訶般若波羅密行深般若波羅密消災般若波羅密禪定般若波羅密智慧般若波羅密精進般若波羅密每日淨心唸十卷積福壽而無涯矣金剛般若波羅密經纂終收經讚金剛妙典舍衛祗園給孤長者佈金田祗陀發心虔功德無邊福壽廣增延三十二分應化非真為人演說大乘經四句妙難倫證悟無生大地放光明三身調御海會祗園解空長老起根源三十二真詮四句幽玄唱誦利人天金剛般若洞爍群昏不住四相與三心是名本來真寂靜常存步步現金身金剛妙典功德難宣四句妙義廣無邊空生信力堅無說無傳應作如是觀南無般若會上佛菩薩又補闕白字納昧字過語真漏字多意不心即錯謬誦經添罪多香花淨水誠心意補闕圓滿罪消磨諸佛菩薩求懺悔唵伽囉地野莎婆訶補念三五七遍願以此功德普及於一切我等與眾生同昇極樂國錄文完
